{{ define "main" }}
<article class="article">
  <h1>{{ .Title }}</h1>
  <div class="prose">
    {{ .Content }}
  </div>
  <nav class="chapter-nav">
    {{ if .NextInSection }}
      <a href="{{ .NextInSection.Permalink }}" class="prev-link">&larr; {{ .NextInSection.Title }}</a>
    {{ end }}
    {{ if .PrevInSection }}
      <a href="{{ .PrevInSection.Permalink }}" class="next-link">{{ .PrevInSection.Title }} &rarr;</a>
    {{ end }}
  </nav>
</article>
{{ end }}
